name: FirewoodTally
options:
  bundleIdPrefix: com.shimondeitel.firewoodtally
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FirewoodTally:
    type: application
    platform: iOS
    sources:
      - path: FirewoodTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.firewoodtally
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FirewoodTally/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FirewoodTallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FirewoodTallyTests
      - path: FirewoodTally.storekit
    dependencies:
      - target: FirewoodTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.firewoodtally.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FirewoodTallyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FirewoodTallyUITests
    dependencies:
      - target: FirewoodTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.firewoodtally.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FirewoodTally:
    build:
      targets:
        FirewoodTally: all
        FirewoodTallyTests: [test]
        FirewoodTallyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FirewoodTally.storekit
    test:
      config: Debug
      storeKitConfiguration: FirewoodTally.storekit
      targets:
        - FirewoodTallyTests
        - FirewoodTallyUITests
    archive:
      config: Release
